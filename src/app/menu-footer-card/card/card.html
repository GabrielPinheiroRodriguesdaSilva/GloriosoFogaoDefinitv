<div class="card produto-card">

    <img
        [src]="imagem"
        [alt]="nome"
        class="card-img-top">

    <div class="card-body">

        <h5 class="card-title">
            {{ nome }}
        </h5>

        <p class="card-text">
            {{ descricao }}
        </p>

        <h4 class="preco">
            R$ {{ preco }}
        </h4>

        <button class="btn btn-dourado">
            Comprar
        </button>

    </div>

</div>
