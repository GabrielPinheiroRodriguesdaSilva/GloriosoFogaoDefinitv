<div class="login-container">
  <div class="login-card">

    <h2>Entrar</h2>
    <p class="subtitle">Faça login na sua conta</p>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>E-mail</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Digite seu e-mail"
          required>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input
          type="password"
          [(ngModel)]="senha"
          name="senha"
          placeholder="Digite sua senha"
          required>
      </div>

      <button type="submit">
        Entrar
      </button>

    </form>

    <p class="erro" *ngIf="mensagemErro">
      {{ mensagemErro }}
    </p>

    <p class="link-cadastro">
      Não possui conta?
      <a routerLink="/registro">Criar conta</a>
    </p>

  </div>
</div>
