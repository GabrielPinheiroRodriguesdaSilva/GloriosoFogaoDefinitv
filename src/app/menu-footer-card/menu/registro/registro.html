<div class="registro-container">
  <div class="registro-card">

    <h2>Criar Conta</h2>
    <p class="subtitle">Cadastre-se para continuar</p>

    <form (ngSubmit)="registrar()">

      <div class="form-group">
        <label>Nome</label>
        <input
          type="text"
          [(ngModel)]="nome"
          name="nome"
          placeholder="Digite seu nome"
          required>
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="Digite seu e-mail"
          required>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input
          type="password"
          [(ngModel)]="senha"
          name="senha"
          placeholder="Digite sua senha"
          required>
      </div>

      <div class="form-group">
        <label>Telefone</label>
        <input
          type="text"
          [(ngModel)]="telefone"
          name="telefone"
          placeholder="Digite seu telefone"
          required>
      </div>

      <div class="form-group">
        <label>CPF</label>
        <input
          type="text"
          [(ngModel)]="cpf"
          name="cpf"
          placeholder="Digite seu CPF"
          required>
      </div>

      <button type="submit">
        Criar Conta
      </button>

    </form>

    <p class="link-login">
      Já possui conta?
      <a routerLink="/login">Entrar</a>
    </p>

  </div>
</div>
